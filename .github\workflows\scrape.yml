name: Scrape Autodefinido Diario

on:
  schedule:
    # Cada día a las 23:45 UTC (00:45 hora española en invierno, 01:45 en verano)
    # El País publica el del día siguiente aproximadamente a medianoche
    - cron: '45 23 * * *'
  
  # Permite lanzarlo manualmente desde GitHub
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Ejecutar scraper
        run: |
          python scrape.py
        env:
          DATA_DIR: data

      - name: Commit y push de los datos nuevos
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          # Solo hace commit si hay cambios
          git diff --staged --quiet || git commit -m "Autodefinido $(date -u +%Y-%m-%d)"
          git push
